# fly.toml app configuration file generated for bwgtbld on 2026-06-22T13:52:47Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bwgtbld'
primary_region = 'iad'

[http_service]
  auto_start_machines = true
  auto_stop_machines = 'stop'
  force_https = true
  internal_port = 3001
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '1gb'
  memory_mb = 256
